<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tiroid Papiller Karsinom Rapor Oluşturucu</title>
    <script type="text/javascript" nonce="3242aba12d8141a8bb576b8a1a0" src="//local.adguard.org?ts=1774423177556&amp;type=content-script&amp;dmn=chatgpt.com&amp;url=https%3A%2F%2Fchatgpt.com%2Fbackend-api%2Festuary%2Fcontent%3Fid%3Dfile_000000001d0071f484bb9804c4295966%26ts%3D492895%26p%3Dfs%26cid%3D1%26sig%3D780acaba55fba3aef758ead0b73856d6b848576400874083a0ebf58720b7a6b9%26v%3D0&amp;app=comet.exe&amp;css=2&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=1&amp;stealth=1&amp;st-dnt"></script><script type="text/javascript" nonce="3242aba12d8141a8bb576b8a1a0" src="//local.adguard.org?ts=1774423177556&amp;name=AdGuard%20Extra&amp;name=AdGuard%20Popup%20Blocker&amp;type=user-script"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <style>
      :root{
        --bg: #f6f7fb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --danger: #ef4444;
        --danger-hover: #dc2626;
        --border: #e5e7eb;

        --shadow-sm: 0 1px 2px rgba(16,24,40,.06);
        --shadow-md: 0 8px 24px rgba(16,24,40,.08);
        --radius: 14px;
        --radius-sm: 10px;

        --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      }

      *{box-sizing:border-box}
      html,body{height:100%}
      body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font)}

      .container{display:flex;flex-direction:column;height:100vh}

      .app-header{
        background: rgba(255,255,255,.85);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
        padding: 18px 22px;
        box-shadow: var(--shadow-sm);
        position: sticky;
        top: 0;
        z-index: 12;
      }
      .app-header h1{margin:0;font-size:18px;letter-spacing:.2px}
      .app-header p{margin:6px 0 0 0;font-size:13px;color:var(--muted);line-height:1.4}

      .topbar-global{
        position: sticky;
        top: 62px;
        z-index: 11;
        background: rgba(246,247,251,.85);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
        padding: 10px 14px;
      }
      .chips-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
      .chips-section-title{font-size:12px;color:var(--muted);margin-right:2px}
      .sep{width:1px;height:20px;background:var(--border);margin:0 2px}

      .chip{
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 999px;
        padding: 7px 10px;
        font-size: 12px;
        cursor:pointer;
        box-shadow: var(--shadow-sm);
        transition: transform .12s ease, box-shadow .12s ease, background .12s ease, border-color .12s ease;
      }
      .chip:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
      .chip.active{
        background: rgba(37,99,235,.10);
        border-color: rgba(37,99,235,.35);
        color: var(--primary);
        font-weight: 600;
      }

      .main-content{
        display:flex;
        flex:1;
        min-height:0;
        overflow:hidden;
        gap: 14px;
        padding: 14px;
      }
      .panel{padding:14px;background:transparent;min-height:0}
      #controls-panel{width:46%;min-width:360px;overflow-y:auto;border-radius:var(--radius)}
      #report-container{width:54%;display:flex;flex-direction:column;gap:12px;min-height:0;border-radius:var(--radius)}

      .report-header{
        display:flex;align-items:center;justify-content:space-between;gap:12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        box-shadow: var(--shadow-sm);
      }
      .report-header h2{margin:0;font-size:14px;letter-spacing:.2px}
      #report-preview{
        flex:1;min-height:0;
        background:#0b1220;color:#e5e7eb;
        border:1px solid rgba(255,255,255,.06);
        border-radius: var(--radius);
        padding: 14px;
        box-shadow: var(--shadow-md);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 13px;
        line-height: 1.7;
        white-space: pre-wrap;
      }

      .control-group{
        margin-bottom:14px;
        padding:14px;
        border:1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow-sm);
      }
      .control-group h3{
        margin:0 0 12px 0;
        font-size: 13px;
        color: var(--text);
        padding-bottom: 10px;
        border-bottom: 1px dashed var(--border);
      }

      .form-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px;align-items:flex-end}
      .form-field{flex:1;min-width:160px;display:flex;flex-direction:column}
      .form-field.small{min-width:120px;flex:.6}
      .form-field label{
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
        letter-spacing: .15px;
      }

      input[type="text"],input[type="number"],select,textarea{
        width:100%;
        background:#fff;
        color:var(--text);
        border:1px solid var(--border);
        padding:10px 11px;
        border-radius: 12px;
        font-size: 13px;
        transition:border-color .15s ease, box-shadow .15s ease;
        box-shadow: inset 0 1px 0 rgba(16,24,40,.03);
      }
      input:focus,select:focus,textarea:focus{
        outline:none;
        border-color: rgba(37,99,235,.55);
        box-shadow: 0 0 0 4px rgba(37,99,235,.12);
      }

      button{
        border:1px solid var(--border);
        background:#fff;
        color:var(--text);
        padding:10px 12px;
        border-radius: 12px;
        cursor:pointer;
        font-size: 13px;
        box-shadow: var(--shadow-sm);
        transition: transform .12s ease, box-shadow .12s ease, background .12s ease, border-color .12s ease;
        display:inline-flex;
        align-items:center;
        gap: 8px;
      }
      button:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
      button.primary, #copy-report-btn{
        background: var(--primary);
        border-color: rgba(37,99,235,.7);
        color:#fff;
      }
      button.primary:hover, #copy-report-btn:hover{background: var(--primary-hover)}
      button.danger{
        background: var(--danger);
        border-color: rgba(239,68,68,.7);
        color:#fff;
      }
      button.danger:hover{background: var(--danger-hover)}

      .toggle-buttons{
        display:flex;
        flex-wrap:wrap;
        gap: 8px;
        background: #f3f4f6;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 6px;
      }
      .toggle-btn{
        border: 1px solid transparent;
        background: transparent;
        box-shadow:none;
        padding: 9px 10px;
        border-radius: 12px;
      }
      .toggle-btn:hover{transform:none;box-shadow:none;background: rgba(17,24,39,.04)}
      .toggle-btn.active{
        background: rgba(37,99,235,.14);
        color: var(--primary);
        border-color: rgba(37,99,235,.20);
        font-weight: 700;
      }
      .toggle-btn.bad.active{
        background: rgba(239,68,68,.14);
        color: var(--danger);
        border-color: rgba(239,68,68,.20);
        font-weight: 800;
      }

      .tumor-focus,.ln-focus{
        border: 1px solid var(--border);
        padding: 14px;
        margin-top: 12px;
        border-radius: var(--radius);
        background: #fff;
        box-shadow: var(--shadow-sm);
      }
      .tumor-focus-header,.ln-focus-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom: 10px;
      }
      .tumor-focus-header h4,.ln-focus-header h4{margin:0;font-size:13px}
      .tumor-focus hr{border:none;border-top:1px dashed var(--border);margin:12px 0}

      .checkbox-group{display:flex;flex-direction:column;gap:10px}
      .checkbox-wrapper{
        display:flex;
        align-items:center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 12px;
        background: #f9fafb;
        border: 1px solid var(--border);
      }
      .checkbox-wrapper input{width:16px;height:16px}
      .checkbox-wrapper label{margin:0;font-size:13px;color:var(--text);font-weight:500}

      .hint-small{font-size:12px;color:var(--muted);margin-top:8px}

      #controls-panel::-webkit-scrollbar{width:10px}
      #controls-panel::-webkit-scrollbar-track{background: transparent}
      #controls-panel::-webkit-scrollbar-thumb{background: rgba(17,24,39,.18);border-radius: 999px}
      #controls-panel::-webkit-scrollbar-thumb:hover{background: rgba(17,24,39,.26)}

      @media (max-width: 1100px){
        .main-content{flex-direction:column}
        #controls-panel, #report-container{width:100%; min-width:unset}
        .topbar-global{top: 66px}
        #report-preview{min-height: 260px}
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header class="app-header">
        <h1>Tiroid Papiller Karsinom Rapor Oluşturucu</h1>
        <p>Raporu oluşturmak için sol paneldeki seçenekleri kullanın. Rapor sağ tarafta anlık olarak güncellenecektir.</p>
      </header>

      <div id="topbar-global" class="topbar-global">
        <div class="chips-row">
          <span class="chips-section-title">Tümör Odakları</span>
          <div id="tumor-chips"></div>
          <div class="sep"></div>
          <span class="chips-section-title">LN</span>
          <div id="ln-chips"></div>
        </div>
      </div>

      <main class="main-content">
        <div id="controls-panel" class="panel"></div>
        <div id="report-container" class="panel">
          <div class="report-header">
            <h2>Rapor Önizlemesi</h2>
            <button id="copy-report-btn" title="Raporu Kopyala"><i class="fa-solid fa-copy"></i> Kopyala</button>
          </div>
          <pre id="report-preview"></pre>
        </div>
      </main>
    </div>

    <script>
      // ------------ STATE ------------
      let state = {
        specimenType: 'Total Tiroidektomi',
        tumors: [{
          id: 1,
          location: 'Sağ lob',
          size: 5,
          sample: '',
          subtypes: ['Klasik papiller karsinom'],
          encapsulation: 'Yoktur',

          // Nekrozdan sonra kapsül / tiroid dışı invazyon seçenekleri
          capsuleEtOptions: ['Tiroid dışı invazyon yoktur'],

          //  (sadece invazyon varsa görünür) - default seçili değil
          strapMuscle: '',

          // LVI vs
          lvInvasion: 'yoktur',
          lymphaticInvasion: false,
          angioinvasion: false,
          perineuralInvasion: false,
          mitoticActivity: '0',
          necrosis: false,

          // Cerrahi sınırlar (HER TÜMÖR İÇİN)
          includeMarginsLine: false,     // rapora eklensin mi?
          marginsTumorPresent: false,    // false: yoktur (default), true: vardır (kötü)
          marginsNote: ''                // tümör cerrahi sınıra ulaşıyorsa ek açıklama
        }],
        lymphNodes: [],

        backgroundThyroid: ['Nodüler guatr'],
        freeNote: '',
        activeTumorId: 1,
        activeLnId: null
      };

      const HISTOLOGIC_SUBTYPES = [
        'Klasik papiller karsinom','İnfiltratif foliküler alt tip','Onkositik papiller alt tip',
        'Warthin benzeri alt tip','Tall cell alt tip','Hobnail alt tip','Solid alt tip','NIFTP','Diffüz sklerozan alt tip'
      ];
      const BACKGROUND_THYROID_OPTIONS = [
        'Nodüler guatr','Fokal lenfositik tiroidit','Yaygın lenfositik tiroidit','Hashimoto tiroiditi','Kolloidden zengin'
      ];

      const CAPSULE_ET_OPTIONS = [
        'Tiroid kapsülüne yapışıktır',
        'Tiroid dışı invazyon vardır',
        'Tiroid dışı invazyon yoktur'
      ];

      const STRAP_OPTIONS = [
        ' invazyonu yoktur',
        ' invazyonu VARDIR'
      ];

      // ------------ DOM ------------
      const controlsPanel = document.getElementById('controls-panel');
      const reportPreview = document.getElementById('report-preview');
      const copyReportBtn = document.getElementById('copy-report-btn');
      const tumorChipsWrap = document.getElementById('tumor-chips');
      const lnChipsWrap = document.getElementById('ln-chips');

      // ------------ UTILS ------------
      function createElement(tag, opts){
        const el = document.createElement(tag);
        if (opts && 'className' in opts) el.className = opts.className;
        if (opts && 'textContent' in opts) el.textContent = opts.textContent;
        if (opts && 'innerHTML' in opts) el.innerHTML = opts.innerHTML;
        if (opts && 'id' in opts) el.id = opts.id;
        return el;
      }
      function topbarHeight(){
        const tb = document.getElementById('topbar-global');
        return tb ? tb.offsetHeight : 0;
      }
      function scrollChildToTop(container, child){
        if (!container || !child) return;
        const cTop = container.getBoundingClientRect().top;
        const offset = child.getBoundingClientRect().top - cTop + container.scrollTop - (topbarHeight() + 8);
        container.scrollTo({ top: Math.max(0, offset), behavior: 'smooth' });
      }
      function collapseTripleNewlines(text){
        while (text.indexOf('\n\n\n') !== -1) text = text.replace('\n\n\n','\n\n');
        return text;
      }
      function setActiveTumorChip(id){
        Array.from(tumorChipsWrap.querySelectorAll('.chip')).forEach(ch=>{
          ch.classList.toggle('active', String(ch.dataset.tid)===String(id));
        });
        state.activeTumorId = id;
      }
      function setActiveLnChip(id){
        Array.from(lnChipsWrap.querySelectorAll('.chip')).forEach(ch=>{
          ch.classList.toggle('active', String(ch.dataset.lid)===String(id));
        });
        state.activeLnId = id;
      }
      function scrollToTumorIdEnsure(id){
        const card = document.getElementById('tumor-card-' + id);
        if (!card) return;
        setActiveTumorChip(id);
        scrollChildToTop(controlsPanel, card);
      }
      function scrollToLnIdEnsure(id){
        const card = document.getElementById('ln-card-' + id);
        if (!card) return;
        setActiveLnChip(id);
        scrollChildToTop(controlsPanel, card);
      }

      let scrollListenerAttached = false;
      let scrollRAF = null;
      function getNearestTumorIdToTop(){
        const cTop = controlsPanel.getBoundingClientRect().top + topbarHeight() + 8;
        let bestId = state.tumors.length ? state.tumors[0].id : null;
        let bestDist = Infinity;
        state.tumors.forEach(t => {
          const el = document.getElementById('tumor-card-' + t.id);
          if (!el) return;
          const d = Math.abs(el.getBoundingClientRect().top - cTop);
          if (d < bestDist){ bestDist = d; bestId = t.id; }
        });
        return bestId;
      }
      function attachScrollListenerOnce(){
        if (scrollListenerAttached) return;
        scrollListenerAttached = true;
        controlsPanel.addEventListener('scroll', () => {
          if (scrollRAF) return;
          scrollRAF = requestAnimationFrame(() => {
            scrollRAF = null;
            const id = getNearestTumorIdToTop();
            if (id != null) setActiveTumorChip(id);
          });
        });
      }

      // ------------ CHIPS ------------
      function renderChips(){
        tumorChipsWrap.innerHTML = '';
        state.tumors.forEach((t, i) => {
          const chip = createElement('button', {
            className: 'chip' + (state.activeTumorId === t.id ? ' active' : ''),
            textContent: (i + 1) + '. Tümör'
          });
          chip.dataset.tid = String(t.id);
          chip.addEventListener('click', ()=> scrollToTumorIdEnsure(t.id));
          tumorChipsWrap.appendChild(chip);
        });

        lnChipsWrap.innerHTML = '';
        state.lymphNodes.forEach((ln, i) => {
          const name = (ln.location ? ln.location + ' ' : '') + (i+1) + '. LN';
          const chip = createElement('button', {
            className: 'chip' + (state.activeLnId === ln.id ? ' active' : ''),
            textContent: name.trim()
          });
          chip.dataset.lid = String(ln.id);
          chip.addEventListener('click', ()=> scrollToLnIdEnsure(ln.id));
          lnChipsWrap.appendChild(chip);
        });
      }

      // ------------ RENDER CONTROLS ------------
      function renderControls(){
        controlsPanel.innerHTML = '';

        // Tanı Bilgileri
        const specimenGroup = createControlGroup('Tanı Bilgileri');
        const specimenSelect = createSelect('specimenType','Materyal Tipi',
          ['Total Tiroidektomi','Konsültasyon, Total tiroidektomi'], state.specimenType);
        specimenSelect.addEventListener('change', e => { state.specimenType = e.target.value; renderReport(); });
        specimenGroup.appendChild(specimenSelect);

        const noteField = createTextarea('diagnosis-note','Tanı altına not (serbest yazı)', state.freeNote || '');
        noteField.querySelector('textarea').addEventListener('input', e => { state.freeNote = e.target.value; renderReport(); });
        specimenGroup.appendChild(noteField);

        controlsPanel.appendChild(specimenGroup);

        // Tümör Odakları
        const tumorsGroup = createControlGroup('Tümör Odakları');
        state.tumors.forEach((tumor, index) => {
          tumorsGroup.appendChild(createTumorFocusControl(tumor, index));
        });
        const addTumorBtn = createElement('button', { className:'primary', innerHTML:'<i class="fa-solid fa-plus"></i> Tümör Odağı Ekle' });
        addTumorBtn.addEventListener('click', () => {
          const newId = Date.now();
          state.tumors.push({
            id:newId,
            location:'Sol lob',
            size:3,
            sample:'',
            subtypes:['Klasik papiller karsinom'],
            encapsulation:'Yoktur',
            capsuleEtOptions:['Tiroid dışı invazyon yoktur'],
            strapMuscle:'',
            lvInvasion:'yoktur',
            lymphaticInvasion:false,
            angioinvasion:false,
            perineuralInvasion:false,
            mitoticActivity:'0',
            necrosis:false,

            includeMarginsLine:false,
            marginsTumorPresent:false,
            marginsNote:''
          });
          state.activeTumorId = newId;
          render();
          requestAnimationFrame(()=>requestAnimationFrame(()=>{
            scrollToTumorIdEnsure(newId);
            const sampleEl = document.getElementById('tumor-sample-' + newId);
            if (sampleEl) sampleEl.focus();
          }));
        });
        tumorsGroup.appendChild(addTumorBtn);
        controlsPanel.appendChild(tumorsGroup);

        // Lenf Nodu Durumu
        const lnGroup = createControlGroup('Lenf Nodu Durumu');
        state.lymphNodes.forEach((ln, index) => {
          lnGroup.appendChild(createLymphNodeControl(ln, index));
        });
        const addLNBtn = createElement('button', { className:'primary', innerHTML:'<i class="fa-solid fa-plus"></i> Lenf Nodu Grubu Ekle' });
        addLNBtn.addEventListener('click', () => {
          const id = Date.now();
          state.lymphNodes.push({ id, location:'', metastatic:0, total:1, pericapsularInvasion:false });
          state.activeLnId = id;
          render();
          requestAnimationFrame(()=>requestAnimationFrame(()=>{
            scrollToLnIdEnsure(id);
            const locEl = document.getElementById('ln-location-' + id);
            if (locEl) locEl.focus();
          }));
        });
        lnGroup.appendChild(addLNBtn);
        controlsPanel.appendChild(lnGroup);

        // Tümör dışı tiroid
        const backgroundGroup = createControlGroup('Tümör Dışı Tiroid');
        const backgroundCheckboxes = createCheckboxGroup(
          'Bulgular',
          BACKGROUND_THYROID_OPTIONS,
          () => state.backgroundThyroid,
          (sel) => { state.backgroundThyroid = sel; renderReport(); }
        );
        backgroundGroup.appendChild(backgroundCheckboxes);
        controlsPanel.appendChild(backgroundGroup);
      }

      function createTumorFocusControl(tumor, index){
        const container = createElement('div', {
          className: 'tumor-focus',
          id: 'tumor-card-' + tumor.id
        });

        const header = createElement('div', { className:'tumor-focus-header' });
        header.appendChild(createElement('h4', { textContent: (index + 1) + '. Odak' }));
        const removeBtn = createElement('button', { className:'danger', innerHTML:'<i class="fa-solid fa-trash-alt"></i>' });
        removeBtn.addEventListener('click', () => {
          if (state.tumors.length > 1){
            state.tumors.splice(index, 1);
            if (!state.tumors.find(t => t.id === state.activeTumorId)) {
              state.activeTumorId = state.tumors.length ? state.tumors[state.tumors.length-1].id : null;
            }
            render();
          }
        });
        if (state.tumors.length <= 1) removeBtn.setAttribute('disabled','true');
        header.appendChild(removeBtn);
        container.appendChild(header);

        const row1 = createElement('div', { className:'form-row' });

        const locationSelect = createSelect('tumor-location-' + tumor.id, 'Yerleşim', ['', 'Sağ lob','Sol lob','İstmus'], tumor.location);
        locationSelect.addEventListener('change', e => { tumor.location = e.target.value; renderReport(); });
        row1.appendChild(locationSelect);

        const sizeInput = createInput('tumor-size-' + tumor.id, 'Çap (mm)', 'number', String(tumor.size));
        sizeInput.addEventListener('input', e => { tumor.size = Number(e.target.value || 0); renderReport(); });
        row1.appendChild(sizeInput);

        const sampleInput = createInput('tumor-sample-' + tumor.id, 'Örnek No', 'text', tumor.sample);
        const sampleEl = sampleInput.querySelector('input');
        sampleEl.setAttribute('maxlength','25');
        sampleEl.addEventListener('input', e => { tumor.sample = e.target.value; renderReport(); });
        row1.appendChild(sampleInput);

        container.appendChild(row1);

        const subtypeSelect = createSelect('tumor-subtypes-' + tumor.id, 'Histolojik Alt Tip', HISTOLOGIC_SUBTYPES, tumor.subtypes[0]);
        subtypeSelect.addEventListener('change', e => { tumor.subtypes = [e.target.value]; renderReport(); });
        container.appendChild(subtypeSelect);

        const findingsContainer = createElement('div', { className:'tumor-findings' });

        findingsContainer.appendChild(
          createToggleButtons(
            'Enkapsülasyon',
            ['Yoktur','vardır','Kısmen vardır'],
            tumor.encapsulation,
            (val) => { tumor.encapsulation = val; renderReport(); }
          )
        );

        const lviButtons = createToggleButtons(
          'Lenfatik ve/veya venöz invazyon',
          ['yoktur','VARDIR','Kuşkulu VARDIR'],
          tumor.lvInvasion,
          (val) => {
            tumor.lvInvasion = val;
            if (val !== 'VARDIR'){ tumor.lymphaticInvasion = false; tumor.angioinvasion = false; }
            render();
          },
          { badOptions: ['VARDIR','Kuşkulu VARDIR'] }
        );
        findingsContainer.appendChild(lviButtons);

        if (tumor.lvInvasion === 'VARDIR'){
          findingsContainer.appendChild(createBooleanToggle('Lenfatik invazyon', tumor.lymphaticInvasion, (v) => { tumor.lymphaticInvasion = v; renderReport(); }, 'VARDIR', 'yoktur', { badWhenTrue:true }));
          findingsContainer.appendChild(createBooleanToggle('Anjioinvazyon', tumor.angioinvasion, (v) => { tumor.angioinvasion = v; renderReport(); }, 'VARDIR', 'yoktur', { badWhenTrue:true }));
        }

        findingsContainer.appendChild(createBooleanToggle('Perinöral invazyon', tumor.perineuralInvasion, (v) => { tumor.perineuralInvasion = v; renderReport(); }, 'VARDIR', 'yoktur', { badWhenTrue:true }));

        const mitoticInput = createInput('tumor-mitosis-' + tumor.id, 'Mitotik Oran (/ 2 mm²)', 'text', tumor.mitoticActivity);
        mitoticInput.querySelector('input').addEventListener('input', e => { tumor.mitoticActivity = e.target.value.replace(/[^0-9]/g,''); renderReport(); });
        findingsContainer.appendChild(mitoticInput);

        findingsContainer.appendChild(createBooleanToggle('Nekroz', tumor.necrosis, (v) => { tumor.necrosis = v; renderReport(); }, 'izlendi', 'yoktur', { badWhenTrue:true }));

        // Nekrozdan sonra: kapsül/ETE (3 checkbox)
        findingsContainer.appendChild(
          createInlineCheckboxGroup(
            'Kapsül ilişkisi / Tiroid dışı invazyon',
            CAPSULE_ET_OPTIONS,
            () => tumor.capsuleEtOptions,
            (sel) => {
              tumor.capsuleEtOptions = sel.length ? sel : ['Tiroid dışı invazyon yoktur'];
              syncTumorDerivedFields(tumor);
              render();
            },
            { idPrefix: 'tumor-capsule-et-' + tumor.id }
          )
        );
        findingsContainer.appendChild(createElement('div', { className:'hint-small', textContent:'Not: “Tiroid dışı invazyon vardır” ve “Tiroid dışı invazyon yoktur” birlikte seçilemez. Varsayılan “Tiroid dışı invazyon yoktur”.' }));

        // : sadece invazyon varsa
        if (tumor.capsuleEtOptions.includes('Tiroid dışı invazyon vardır')) {
          findingsContainer.appendChild(
            createToggleButtons(
              '',
              STRAP_OPTIONS,
              tumor.strapMuscle || '',
              (val)=>{ tumor.strapMuscle = val; syncTumorDerivedFields(tumor); render(); },
              { badOptions: [' invazyonu VARDIR'] }
            )
          );
        }

        // Cerrahi sınırlar: her tümör için, istenirse rapora satır olarak eklensin
        findingsContainer.appendChild(
          createBooleanToggle(
            'Cerrahi sınırlar satırını rapora ekle',
            tumor.includeMarginsLine,
            (v)=>{
              tumor.includeMarginsLine = v;
              if (!v) { tumor.marginsTumorPresent = false; tumor.marginsNote = ''; }
              syncTumorDerivedFields(tumor);
              render();
            },
            'Eklensin',
            'Eklenmesin',
            { badWhenTrue:false }
          )
        );

        if (tumor.includeMarginsLine){
          findingsContainer.appendChild(
            createToggleButtons(
              'Cerrahi sınırlar',
              ['Cerrahi sınırlarda tümör yoktur','Cerrahi sınırlarda tümör VARDIR'],
              tumor.marginsTumorPresent ? 'Cerrahi sınırlarda tümör VARDIR' : 'Cerrahi sınırlarda tümör yoktur',
              (val)=>{
                tumor.marginsTumorPresent = (val === 'Cerrahi sınırlarda tümör VARDIR');
                if (!tumor.marginsTumorPresent) tumor.marginsNote = '';
                render();
              },
              { badOptions: ['Cerrahi sınırlarda tümör VARDIR'] }
            )
          );

          if (tumor.marginsTumorPresent){
            const marginsNoteField = createTextarea('tumor-margins-note-' + tumor.id, 'Cerrahi sınır ek açıklama', tumor.marginsNote || '');
            marginsNoteField.querySelector('textarea').addEventListener('input', e => {
              tumor.marginsNote = e.target.value;
              renderReport();
            });
            findingsContainer.appendChild(marginsNoteField);
          }
        }

        container.appendChild(document.createElement('hr'));
        container.appendChild(findingsContainer);
        return container;
      }

      function createLymphNodeControl(ln, index){
        const container = createElement('div', {
          className: 'ln-focus',
          id: 'ln-card-' + ln.id
        });
        const header = createElement('div', { className:'ln-focus-header' });
        header.appendChild(createElement('h4', { textContent: (index + 1) + '. Lenf Nodu Grubu' }));
        const removeBtn = createElement('button', { className:'danger', innerHTML:'<i class="fa-solid fa-trash-alt"></i>' });
        removeBtn.addEventListener('click', () => {
          state.lymphNodes.splice(index, 1);
          if (!state.lymphNodes.find(x => x.id === state.activeLnId)) state.activeLnId = state.lymphNodes.length ? state.lymphNodes[state.lymphNodes.length-1].id : null;
          render();
        });
        header.appendChild(removeBtn);
        container.appendChild(header);

        const row1 = createElement('div', { className:'form-row' });

        const locationInput = createInput('ln-location-' + ln.id, 'Yerleşim', 'text', ln.location || '');
        locationInput.addEventListener('input', e => { ln.location = e.target.value; renderReport(); });
        row1.appendChild(locationInput);

        const metastaticInput = createInput('ln-meta-' + ln.id, 'Metastatik', 'number', String(ln.metastatic));
        metastaticInput.classList.add('small');
        metastaticInput.addEventListener('input', e => {
          ln.metastatic = Number(e.target.value || 0);
          if (ln.metastatic <= 0) ln.pericapsularInvasion = false;
          render();
        });
        row1.appendChild(metastaticInput);

        const totalInput = createInput('ln-total-' + ln.id, 'Toplam', 'number', String(ln.total));
        totalInput.classList.add('small');
        totalInput.addEventListener('input', e => { ln.total = Number(e.target.value || 0); renderReport(); });
        row1.appendChild(totalInput);

        container.appendChild(row1);

        // Metastaz yoksa perikapsüler invazyon seçimi çıkmasın
        if (ln.metastatic > 0){
          container.appendChild(
            createBooleanToggle(
              'Perikapsüler invazyon',
              ln.pericapsularInvasion,
              (v)=>{ ln.pericapsularInvasion = v; renderReport(); },
              'Var',
              'Yok',
              { badWhenTrue:true }
            )
          );
        }

        return container;
      }

      // ------------ COMPONENTS ------------
      function createControlGroup(title){
        const g = createElement('div', { className:'control-group' });
        g.appendChild(createElement('h3', { textContent:title }));
        return g;
      }
      function createInput(id,label,type,value){
        const f = createElement('div', { className:'form-field' });
        f.appendChild(createElement('label', { textContent:label }));
        const input = createElement('input', { id:id });
        input.type = type;
        input.value = value;
        if (type === 'number') input.min = '0';
        f.appendChild(input);
        return f;
      }
      function createTextarea(id,label,value){
        const f = createElement('div', { className:'form-field' });
        f.appendChild(createElement('label', { textContent:label }));
        const ta = document.createElement('textarea');
        ta.id = id; ta.rows = 3; ta.value = value || '';
        f.appendChild(ta);
        return f;
      }
      function createSelect(id,label,options,selected){
        const f = createElement('div', { className:'form-field' });
        f.appendChild(createElement('label', { textContent:label }));
        const sel = createElement('select', { id:id });
        options.forEach(opt => {
          const o = createElement('option', { textContent:opt });
          o.value = opt;
          if (opt === selected) o.selected = true;
          sel.appendChild(o);
        });
        f.appendChild(sel);
        return f;
      }

      function createBooleanToggle(label,value,onChange,trueText='VARDIR',falseText='yoktur', opts){
        opts = opts || {};
        const c = createElement('div', { className:'form-field' });
        c.appendChild(createElement('label', { textContent:label }));
        const btn = createElement('button', { className:'toggle-btn', textContent: (value ? trueText : falseText) });
        if (opts.badWhenTrue) btn.classList.add('bad');
        btn.classList.toggle('active', !!value);
        btn.addEventListener('click', () => {
          value = !value;
          btn.classList.toggle('active', value);
          btn.textContent = value ? trueText : falseText;
          onChange(value);
        });
        c.appendChild(btn);
        return c;
      }

      function createToggleButtons(label, options, value, onChange, opts){
        opts = opts || {};
        const bad = new Set(opts.badOptions || []);
        const c = createElement('div', { className:'form-field' });
        c.appendChild(createElement('label', { textContent:label }));
        const g = createElement('div', { className:'toggle-buttons' });
        const buttons = [];
        options.forEach(opt => {
          const b = createElement('button', { className:'toggle-btn', textContent:opt });
          if (bad.has(opt)) b.classList.add('bad');
          b.classList.toggle('active', value === opt);
          b.addEventListener('click', () => {
            buttons.forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            onChange(opt);
          });
          buttons.push(b);
          g.appendChild(b);
        });
        c.appendChild(g);
        return c;
      }

      function createCheckboxGroup(label, options, selectedGetter, onChange){
        const c = createElement('div', { className:'form-field' });
        c.appendChild(createElement('label', { textContent:label }));
        const box = createElement('div', { className:'checkbox-group' });

        const selected = selectedGetter();

        options.forEach(opt => {
          const wrap = createElement('div', { className:'checkbox-wrapper' });
          const cb = document.createElement('input'); cb.type='checkbox';
          const safeId = 'bg-thyroid-' + opt.replace(/[^a-zA-Z0-9]/g,'-');
          cb.id = safeId; cb.value = opt; cb.checked = selected.includes(opt);

          cb.addEventListener('change', e => {
            const cur = selectedGetter();
            const val = e.target.value;
            let next;
            if (e.target.checked) next = cur.includes(val) ? cur : [...cur, val];
            else next = cur.filter(x => x !== val);
            onChange(next);
          });

          const lab = createElement('label', { textContent:opt }); lab.htmlFor = safeId;
          wrap.appendChild(cb); wrap.appendChild(lab); box.appendChild(wrap);
        });

        c.appendChild(box);
        return c;
      }

      function createInlineCheckboxGroup(label, options, selectedGetter, onChange, opts){
        opts = opts || {};
        const c = createElement('div', { className:'form-field' });
        c.appendChild(createElement('label', { textContent:label }));
        const box = createElement('div', { className:'checkbox-group' });

        const selected = selectedGetter() || [];

        options.forEach((opt, idx) => {
          const wrap = createElement('div', { className:'checkbox-wrapper' });
          const cb = document.createElement('input'); cb.type='checkbox';
          const safeBase = opts.idPrefix || label;
          const safeId = 'inline-cb-' + safeBase.replace(/[^a-zA-Z0-9]/g,'-') + '-' + idx;
          cb.id = safeId; cb.value = opt; cb.checked = selected.includes(opt);

          cb.addEventListener('change', e => {
            const cur = selectedGetter() || [];
            const val = e.target.value;
            let next;

            if (e.target.checked) {
              next = cur.includes(val) ? [...cur] : [...cur, val];

              if (val === 'Tiroid dışı invazyon vardır') {
                next = next.filter(x => x !== 'Tiroid dışı invazyon yoktur');
              }
              if (val === 'Tiroid dışı invazyon yoktur') {
                next = next.filter(x => x !== 'Tiroid dışı invazyon vardır');
              }
            } else {
              next = cur.filter(x => x !== val);
            }

            if (!next.length) next = ['Tiroid dışı invazyon yoktur'];
            onChange(next);
          });

          const lab = createElement('label', { textContent:opt }); lab.htmlFor = safeId;
          wrap.appendChild(cb); wrap.appendChild(lab); box.appendChild(wrap);
        });

        c.appendChild(box);
        return c;
      }

      // ------------ REPORT ------------
      function getTumorDiagnosisName(size){ return size > 10 ? 'Tiroid papiller karsinom' : 'Tiroid papiller mikrokarsinom'; }

      function normalizeEncapsulation(enc){
        if (enc === 'vardır') return 'vardır';
        if (enc === 'Kısmen vardır') return 'vardır (kısmen)';
        return 'yoktur';
      }

      function sentence(value){
        if (!value) return '';
        const v = String(value).trim();
        if (!v) return '';
        return /[.!?]$/.test(v) ? v : v + '.';
      }

      function hasEtOrCapsuleAdhesion(t){
        const opts = (t.capsuleEtOptions && t.capsuleEtOptions.length) ? t.capsuleEtOptions : [];
        return opts.includes('Tiroid dışı invazyon vardır') || opts.includes('Tiroid kapsülüne yapışıktır');
      }

      function requiresMarginsLine(t){
        return hasEtOrCapsuleAdhesion(t) || !!(t.strapMuscle && t.strapMuscle.trim());
      }

      function syncTumorDerivedFields(t){
        if (!t.capsuleEtOptions || !t.capsuleEtOptions.length) t.capsuleEtOptions = ['Tiroid dışı invazyon yoktur'];

        // Tiroid dışı invazyon yoksa Çizgili kas alanı ilgili tümör için temizlenir.
        if (!t.capsuleEtOptions.includes('Tiroid dışı invazyon vardır')) t.strapMuscle = '';

        // Kural: Çizgili kas durumu, tiroid dışı invazyon veya kapsüle yapışıklık varsa
        // cerrahi sınır satırı aynı tümör odağına otomatik eklenir.
        if (requiresMarginsLine(t)) t.includeMarginsLine = true;
      }

      function syncAllTumorsDerivedFields(){
        state.tumors.forEach(syncTumorDerivedFields);
      }

      function generateFindingsText(t, indent){
        indent = indent || '';
        let text = '';

        text += indent + sentence('Tümörde enkapsülasyon ' + normalizeEncapsulation(t.encapsulation)) + '\n';

        let lvi = 'Lenfatik ve/veya venöz invazyon ' + t.lvInvasion;
        if (t.lvInvasion === 'VARDIR'){
          lvi += '. Lenfatik invazyon ' + (t.lymphaticInvasion ? 'VARDIR' : 'yoktur') +
                 '. Anjioinvazyon ' + (t.angioinvasion ? 'VARDIR' : 'yoktur');
        }
        text += indent + sentence(lvi) + '\n';

        text += indent + sentence('Perinöral invazyon ' + (t.perineuralInvasion ? 'VARDIR' : 'yoktur')) + '\n';

        if (t.mitoticActivity && t.mitoticActivity !== '0') text += indent + sentence('Mitotik aktivite 2 mm² alanda ' + t.mitoticActivity + ' olarak izlenmiştir') + '\n';
        else text += indent + sentence('Mitotik aktivite yoktur') + '\n';

        text += indent + sentence('Nekroz ' + (t.necrosis ? 'izlenmiştir' : 'yoktur')) + '\n';

        const opts = (t.capsuleEtOptions && t.capsuleEtOptions.length) ? t.capsuleEtOptions : ['Tiroid dışı invazyon yoktur'];
        opts.forEach(opt => {
          text += indent + sentence(opt) + '\n';
        });

        if (opts.includes('Tiroid dışı invazyon vardır')){
          if (t.strapMuscle && t.strapMuscle.trim()){
            text += indent + sentence(t.strapMuscle.replace('vardır', 'VARDIR')) + '\n';
          }
        }

        if (t.includeMarginsLine){
          text += indent + sentence(t.marginsTumorPresent ? 'Cerrahi sınırlarda tümör VARDIR' : 'Cerrahi sınırlarda tümör yoktur') + '\n';
          if (t.marginsTumorPresent && t.marginsNote && t.marginsNote.trim()) {
            text += indent + sentence('Cerrahi sınır açıklaması: ' + t.marginsNote.trim()) + '\n';
          }
        }

        return text;
      }

      function generateReportText(){
        syncAllTumorsDerivedFields();
        let report = '';
        const s = state;

        report += s.specimenType + ':\n';
        const maxSize = s.tumors.length ? Math.max.apply(null, s.tumors.map(t => t.size)) : 0;
        report += sentence(getTumorDiagnosisName(maxSize)) + '\n';
        if (s.freeNote && s.freeNote.trim()) report += sentence(s.freeNote.trim()) + '\n';

        if (s.tumors.length === 1){
          const t = s.tumors[0];
          if (t.location) report += sentence('Tümör ' + t.location + ' yerleşimlidir') + '\n';
          report += sentence("Tümör çapı " + t.size + " mm'dir") + '\n';
          if (t.subtypes.length) report += sentence('Tümör ' + t.subtypes.join(' ve ') + ' histolojisindedir') + '\n';
          if (t.sample) report += sentence('Örnek No: ' + t.sample) + '\n';
          report += '\n' + generateFindingsText(t);
        } else if (s.tumors.length > 1){
          report += sentence('Tümör odaklılığı ' + s.tumors.length + ' odaklıdır. Multifokal tümör VARDIR') + '\n\n';
          report += 'Tümör odakları:\n';
          s.tumors.forEach((t,i) => {
            const dx = getTumorDiagnosisName(t.size);
            report += (i+1) + '. Tümör: ' + dx + '\n';
            if (t.location) report += '  ' + sentence('Yerleşim: ' + t.location) + '\n';
            report += '  ' + sentence('Çap: ' + t.size + ' mm') + '\n';
            if (t.subtypes.length) report += '  ' + sentence('Histoloji: ' + t.subtypes.join(' ve ')) + '\n';
            if (t.sample) report += '  ' + sentence('Örnek No: ' + t.sample) + '\n';
            report += generateFindingsText(t, '  ');
            report += '\n';
          });
        }

        if (s.lymphNodes.length){
          report += '\nLenf nodları:\n';
          s.lymphNodes.forEach(ln => {
            const total = Number(ln.total || 0);
            const meta = Number(ln.metastatic || 0);
            const locPrefix = ln.location ? ln.location + ' yerleşiminden ' : '';
            if (meta > 0){
              report += sentence(locPrefix + total + ' lenf nodunun ' + meta + "'inde metastaz VARDIR (" + meta + '/' + total + ')') + ' ';
              report += sentence('Perikapsüler invazyon ' + (ln.pericapsularInvasion ? 'VARDIR' : 'yoktur')) + '\n';
            } else {
              report += sentence(locPrefix + total + ' lenf nodu izlenmiştir. Metastaz yoktur (0/' + total + ')') + '\n';
            }
          });
        }

        if (s.backgroundThyroid.length){
          report += '\n' + sentence('Tümör dışı tiroid parankiminde ' + s.backgroundThyroid.join(', ') + ' izlenmiştir') + '\n';
        }

        return collapseTripleNewlines(report.trim());
      }
      // ------------ MAIN ------------
      function renderReport(){
        syncAllTumorsDerivedFields();
        reportPreview.textContent = generateReportText();
      }

      function render(){
        renderChips();
        renderControls();
        attachScrollListenerOnce();
        renderReport();
        if (state.activeTumorId != null) setActiveTumorChip(state.activeTumorId);
        if (state.activeLnId != null) setActiveLnChip(state.activeLnId);
      }

      function copyReport(){
        const txt = reportPreview.textContent;
        if (!txt) return;
        navigator.clipboard.writeText(txt).then(() => {
          copyReportBtn.innerHTML = '<i class="fa-solid fa-check"></i> Kopyalandı!';
          setTimeout(() => { copyReportBtn.innerHTML = '<i class="fa-solid fa-copy"></i> Kopyala'; }, 1600);
        }, () => { alert('Rapor kopyalanamadı.'); });
      }
      copyReportBtn.addEventListener('click', copyReport);

      render();
    </script>
  </body>
</html>
