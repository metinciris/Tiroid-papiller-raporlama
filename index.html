<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiroid Papiller Karsinom Rapor Oluşturucu</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{
      --bg:#eef3fb; --bg2:#f8fafc; --panel:#ffffff; --text:#0f172a; --muted:#64748b;
      --primary:#2563eb; --primary2:#1d4ed8; --primary-soft:#dbeafe;
      --success:#059669; --success-soft:#d1fae5;
      --warn:#d97706; --warn-soft:#ffedd5;
      --danger:#dc2626; --danger2:#b91c1c; --danger-soft:#fee2e2;
      --filled:#fff7ed; --filled-border:#fdba74; --active:#eff6ff;
      --border:#dbe3ee; --shadow:0 18px 45px rgba(15,23,42,.10); --shadow2:0 8px 22px rgba(15,23,42,.08);
      --radius:22px; --radius2:16px; --font:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    }
    *{box-sizing:border-box} html,body,#root{min-height:100%;margin:0} body{font-family:var(--font);background:linear-gradient(135deg,#eef3fb 0%,#f8fafc 45%,#f1f5f9 100%);color:var(--text)}
    button,input,select,textarea{font:inherit} button{cursor:pointer}
    .app{min-height:100vh;display:flex;flex-direction:column}
    .hero{position:sticky;top:0;z-index:20;background:rgba(248,250,252,.82);backdrop-filter:blur(18px);border-bottom:1px solid rgba(219,227,238,.9)}
    .hero-inner{max-width:1500px;margin:0 auto;padding:18px 22px 14px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .brand{display:flex;align-items:center;gap:14px}.logo{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:white;display:grid;place-items:center;font-weight:900;box-shadow:var(--shadow2)}
    h1{font-size:20px;margin:0}.subtitle{font-size:13px;color:var(--muted);margin:4px 0 0}.toolbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .btn{border:1px solid var(--border);background:white;color:var(--text);border-radius:13px;padding:10px 13px;box-shadow:0 2px 9px rgba(15,23,42,.05);transition:.15s transform,.15s box-shadow,.15s background,.15s border-color;display:inline-flex;gap:8px;align-items:center}.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow2)}
    .btn.primary{background:var(--primary);border-color:var(--primary);color:white}.btn.primary:hover{background:var(--primary2)}.btn.danger{background:var(--danger);border-color:var(--danger);color:white}.btn.ghost{background:rgba(255,255,255,.65)}
    .chipsbar{max-width:1500px;margin:0 auto;padding:0 22px 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}.chips-title{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}.chip{border:1px solid var(--border);background:white;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:800;box-shadow:0 2px 9px rgba(15,23,42,.05);transition:.15s}.chip:hover{transform:translateY(-1px)}.chip.active{background:var(--primary-soft);border-color:#93c5fd;color:#1d4ed8}.chip.bad{background:var(--danger-soft);border-color:#fca5a5;color:var(--danger2)}.chip.bad.active{box-shadow:0 0 0 4px rgba(220,38,38,.12)}.sep{width:1px;height:22px;background:var(--border)}
    .layout{max-width:1500px;width:100%;margin:0 auto;display:grid;grid-template-columns:minmax(430px,48%) minmax(420px,52%);gap:18px;padding:18px 22px 24px;min-height:0}.left,.right{min-height:0}.left{display:flex;flex-direction:column;gap:14px}.right{position:sticky;top:122px;height:calc(100vh - 144px);display:flex;flex-direction:column;gap:14px}
    .card{background:rgba(255,255,255,.84);border:1px solid rgba(219,227,238,.9);border-radius:var(--radius);box-shadow:var(--shadow2);overflow:hidden}.card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 16px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(248,250,252,.75))}.card-title{font-size:14px;font-weight:900;margin:0;display:flex;gap:8px;align-items:center}.card-body{padding:16px}.section{display:flex;flex-direction:column;gap:12px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.field{grid-column:span 6;display:flex;flex-direction:column;gap:7px}.field.full{grid-column:1/-1}.field.third{grid-column:span 4}.field.quarter{grid-column:span 3}.label{font-size:12px;font-weight:900;color:#475569;display:flex;justify-content:space-between;gap:8px}.input,.select,.textarea{width:100%;border:1px solid var(--border);border-radius:14px;background:white;padding:11px 12px;outline:none;transition:.16s box-shadow,.16s border-color,.16s background}.textarea{min-height:78px;resize:vertical}.input:focus,.select:focus,.textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.12)}.input.filled,.select.filled,.textarea.filled{background:var(--filled);border-color:var(--filled-border)}.input.bad,.select.bad,.textarea.bad{background:var(--danger-soft);border-color:#fca5a5;color:#7f1d1d}.flash{animation:flashGlow 900ms ease}.report-line.flash{animation:reportFlash 1000ms ease}@keyframes flashGlow{0%{box-shadow:0 0 0 0 rgba(37,99,235,.35)}30%{box-shadow:0 0 0 5px rgba(37,99,235,.16);background:#eff6ff}100%{box-shadow:0 0 0 0 transparent}}@keyframes reportFlash{0%{background:#dbeafe;box-shadow:inset 4px 0 #2563eb}100%{background:transparent;box-shadow:inset 0 0 transparent}}
    .toggle-group{display:flex;flex-wrap:wrap;gap:8px;padding:7px;background:#f1f5f9;border:1px solid var(--border);border-radius:16px}.toggle{border:1px solid transparent;background:transparent;padding:9px 11px;border-radius:12px;font-size:12px;font-weight:900;color:#475569}.toggle.active{background:white;border-color:#bfdbfe;color:#1d4ed8;box-shadow:0 2px 10px rgba(15,23,42,.06)}.toggle.bad.active{background:var(--danger-soft);border-color:#fca5a5;color:var(--danger2)}.toggle.warn.active{background:var(--warn-soft);border-color:#fdba74;color:#9a3412}
    .check-list{display:grid;gap:8px}.check{display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:14px;background:#f8fafc;padding:10px 11px;font-size:13px;font-weight:700;color:#334155}.check input{width:17px;height:17px}.check.selected{background:var(--filled);border-color:var(--filled-border)}.check.bad.selected{background:var(--danger-soft);border-color:#fca5a5;color:#991b1b}
    .tumor-card{border-radius:var(--radius);border:1px solid var(--border);background:white;box-shadow:var(--shadow2);overflow:hidden;transition:.16s border-color,.16s box-shadow,.16s transform}.tumor-card.active{border-color:#60a5fa;box-shadow:0 0 0 4px rgba(37,99,235,.10),var(--shadow)}.tumor-card.bad{border-color:#fca5a5}.tumor-top{padding:14px 15px;background:linear-gradient(135deg,#ffffff,#f8fafc);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}.tumor-name{display:flex;align-items:center;gap:10px;font-weight:950}.badge{font-size:11px;font-weight:950;border-radius:999px;padding:5px 8px;background:#e2e8f0;color:#334155}.badge.active{background:var(--primary-soft);color:#1d4ed8}.badge.bad{background:var(--danger-soft);color:var(--danger2)}.tumor-body{padding:15px}.mini-summary{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.mini{font-size:11px;font-weight:900;border-radius:999px;padding:5px 8px;background:#f1f5f9;color:#475569}.mini.filled{background:var(--filled);color:#9a3412}.mini.bad{background:var(--danger-soft);color:var(--danger2)}
    .report-card{flex:1;min-height:0;display:flex;flex-direction:column}.report-actions{display:flex;gap:9px;flex-wrap:wrap}.report-preview{flex:1;min-height:0;overflow:auto;background:#0b1220;color:#e5e7eb;border-radius:0 0 var(--radius) var(--radius);padding:17px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:13px;line-height:1.72;white-space:pre-wrap}.report-line{display:block;border-radius:8px;padding:1px 7px;margin:0 -7px;min-height:1.72em}.report-line.bad{color:#fecaca;background:rgba(127,29,29,.20)}.report-line.title{color:#bfdbfe;font-weight:900}.report-preview::-webkit-scrollbar,.left-scroll::-webkit-scrollbar{width:11px}.report-preview::-webkit-scrollbar-thumb,.left-scroll::-webkit-scrollbar-thumb{background:rgba(148,163,184,.36);border-radius:999px}.copy-ok{color:#86efac;font-size:12px;font-weight:900}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:white;border:1px solid var(--border);border-radius:16px;padding:12px;box-shadow:0 2px 10px rgba(15,23,42,.04)}.stat b{display:block;font-size:20px}.stat span{font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}.stat.bad{background:var(--danger-soft);border-color:#fca5a5;color:#7f1d1d}.hint{font-size:12px;line-height:1.5;color:var(--muted);background:#f8fafc;border:1px dashed var(--border);border-radius:14px;padding:10px}.small-row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
    @media(max-width:1100px){.hero-inner{align-items:flex-start;flex-direction:column}.toolbar{justify-content:flex-start}.layout{grid-template-columns:1fr}.right{position:static;height:70vh}.field,.field.third,.field.quarter{grid-column:1/-1}.stats{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useMemo,useRef,useState,useEffect} = React;

const HISTOLOGIC_SUBTYPES = ['Klasik papiller karsinom','İnfiltratif foliküler alt tip','Onkositik papiller alt tip','Warthin benzeri alt tip','Tall cell alt tip','Hobnail alt tip','Solid alt tip','NIFTP','Diffüz sklerozan alt tip'];
const BACKGROUND_THYROID_OPTIONS = ['Nodüler guatr','Fokal lenfositik tiroidit','Yaygın lenfositik tiroidit','Hashimoto tiroiditi','Kolloidden zengin'];
const TUMOR_LOCATION_EXAMPLES = ['Sağ lob','Sol lob','İstmus','Sağ lob üst pol','Sağ lob istmus bileşkesi','Sağ lob alt pol','Sol lob üst pol','Sol lob istmus bileşkesi','Sol lob alt pol','İstmus sağ lateral','İstmus sol lateral'];
const CAPSULE_ET_OPTIONS = ['Tiroid kapsülüne yapışıktır','Tiroid dışı invazyon vardır','Tiroid dışı invazyon yoktur'];
const STRAP_OPTIONS = ['Çizgili kas invazyonu yoktur','Çizgili kas invazyonu VARDIR'];
const BAD_SUBTYPES = new Set(['Tall cell alt tip','Hobnail alt tip','Solid alt tip','Diffüz sklerozan alt tip']);
const STORAGE_KEY = 'tiroid-papiller-raporlama-react-v1';

const blankTumor = (id=Date.now()) => ({id,location:'',size:'',sample:'',subtypes:['Klasik papiller karsinom'],encapsulation:'Yoktur',capsuleEtOptions:['Tiroid dışı invazyon yoktur'],strapMuscle:'',lvInvasion:'yoktur',lymphaticInvasion:false,angioinvasion:false,perineuralInvasion:false,mitoticActivity:'0',necrosis:false,includeMarginsLine:false,marginsTumorPresent:false,marginsNote:''});
const blankLn = (id=Date.now()) => ({id,location:'',metastatic:0,total:1,metastaticTumorSize:'',ene:false,eneSize:'',pericapsularInvasion:false});
const initialState = {specimenType:'Total Tiroidektomi',tumors:[blankTumor(1)],lymphNodes:[],backgroundThyroid:['Nodüler guatr'],freeNote:'',activeTumorId:1,activeLnId:null};

function sentence(value){ if(!value) return ''; const v=String(value).trim(); if(!v) return ''; return /[.!?]$/.test(v)?v:v+'.'; }
function getTumorDiagnosisName(size){ return Number(size)>10 ? 'Tiroid papiller karsinom' : 'Tiroid papiller mikrokarsinom'; }
function normalizeEncapsulation(enc){ if(enc==='vardır') return 'vardır'; if(enc==='Kısmen vardır') return 'vardır (kısmen)'; return 'yoktur'; }
function hasEtOrCapsuleAdhesion(t){ const opts=t.capsuleEtOptions||[]; return opts.includes('Tiroid dışı invazyon vardır') || opts.includes('Tiroid kapsülüne yapışıktır'); }
function requiresMarginsLine(t){ return hasEtOrCapsuleAdhesion(t) || !!(t.strapMuscle&&String(t.strapMuscle).trim()); }
function syncTumor(t){ const n={...t, subtypes:t.subtypes&&t.subtypes.length?t.subtypes:['Klasik papiller karsinom'], capsuleEtOptions:t.capsuleEtOptions&&t.capsuleEtOptions.length?t.capsuleEtOptions:['Tiroid dışı invazyon yoktur']}; if(!n.capsuleEtOptions.includes('Tiroid dışı invazyon vardır')) n.strapMuscle=''; if(requiresMarginsLine(n)) n.includeMarginsLine=true; return n; }
function isTumorBad(t){ return t.lvInvasion==='VARDIR' || t.lvInvasion==='Kuşkulu VARDIR' || t.lymphaticInvasion || t.angioinvasion || t.perineuralInvasion || t.necrosis || (t.capsuleEtOptions||[]).includes('Tiroid dışı invazyon vardır') || t.strapMuscle==='Çizgili kas invazyonu VARDIR' || t.marginsTumorPresent || (t.subtypes||[]).some(x=>BAD_SUBTYPES.has(x)); }
function isLnBad(ln){ return Number(ln.metastatic||0)>0 || !!ln.ene || !!ln.pericapsularInvasion; }
function line(text,key,bad=false,title=false){ return {text,key,bad,title}; }

function generateFindingsLines(t, prefix=''){
  const out=[];
  out.push(line(prefix+sentence('Tümörde enkapsülasyon '+normalizeEncapsulation(t.encapsulation)),'encapsulation'));
  let lvi='Lenfatik ve/veya venöz invazyon: '+t.lvInvasion;
  if(t.lvInvasion==='VARDIR'){
    const types=[]; if(t.lymphaticInvasion) types.push('lenfatik invazyon'); if(t.angioinvasion) types.push('anjioinvazyon');
    lvi += types.length ? '. İzlenen invazyon tipi: '+types.join(' ve ') : '. İnvazyon tipi belirtilmemiştir';
  }
  out.push(line(prefix+sentence(lvi),'lvInvasion',t.lvInvasion!=='yoktur'));
  out.push(line(prefix+sentence('Perinöral invazyon '+(t.perineuralInvasion?'VARDIR':'yoktur')),'perineuralInvasion',t.perineuralInvasion));
  out.push(line(prefix+sentence(t.mitoticActivity && t.mitoticActivity!=='0' ? 'Mitotik aktivite 2 mm² alanda '+t.mitoticActivity+' olarak izlenmiştir' : 'Mitotik aktivite izlenmemiştir'),'mitoticActivity'));
  out.push(line(prefix+sentence('Nekroz '+(t.necrosis?'izlenmiştir':'yoktur')),'necrosis',t.necrosis));
  const opts=t.capsuleEtOptions&&t.capsuleEtOptions.length?t.capsuleEtOptions:['Tiroid dışı invazyon yoktur'];
  opts.forEach(opt=>out.push(line(prefix+sentence(opt),'capsuleEtOptions',opt==='Tiroid dışı invazyon vardır')));
  if(opts.includes('Tiroid dışı invazyon vardır') && t.strapMuscle&&t.strapMuscle.trim()) out.push(line(prefix+sentence(t.strapMuscle),'strapMuscle',t.strapMuscle.includes('VARDIR')));
  if(t.includeMarginsLine){
    out.push(line(prefix+sentence(t.marginsTumorPresent?'Cerrahi sınırlarda tümör VARDIR':'Cerrahi sınırlarda tümör yoktur'),'marginsTumorPresent',t.marginsTumorPresent));
    if(t.marginsTumorPresent && t.marginsNote&&t.marginsNote.trim()) out.push(line(prefix+sentence('Cerrahi sınır açıklaması: '+t.marginsNote.trim()),'marginsNote',true));
  }
  return out;
}
function generateReport(s){
  const tumors=s.tumors.map(syncTumor); const out=[]; const sizes=tumors.map(t=>Number(t.size)).filter(v=>Number.isFinite(v)&&v>0); const max=sizes.length?Math.max(...sizes):0;
  out.push(line(s.specimenType+':','specimenType',false,true));
  out.push(line(sentence(max>0?getTumorDiagnosisName(max):'Tiroid papiller karsinom'),'diagnosis',false,true));
  if(s.freeNote&&s.freeNote.trim()) out.push(line(sentence(s.freeNote.trim()),'freeNote'));
  if(tumors.length===1){
    const t=tumors[0]; if(t.location) out.push(line(sentence('Tümör '+t.location+' yerleşimlidir'),'location'));
    if(Number(t.size)>0) out.push(line(sentence("Tümör çapı "+t.size+" mm'dir"),'size'));
    if(t.subtypes.length) out.push(line(sentence('Tümör '+t.subtypes.join(' ve ')+' histolojisindedir'),'subtypes',t.subtypes.some(x=>BAD_SUBTYPES.has(x))));
    if(t.sample) out.push(line(sentence('Örnek No: '+t.sample),'sample'));
    out.push(line('','space1'));
    out.push(...generateFindingsLines(t));
  } else {
    out.push(line(sentence('Tümör odaklılığı '+tumors.length+' odaklıdır. Multifokal tümör VARDIR'),'multifocal',true));
    out.push(line('','space2')); out.push(line('Tümör odakları:','tumor-title',false,true));
    tumors.forEach((t,i)=>{ const bad=isTumorBad(t); out.push(line((i+1)+'. Tümör: '+getTumorDiagnosisName(t.size),'tumor-'+t.id,bad,true));
      if(t.location) out.push(line('  '+sentence('Yerleşim: '+t.location),'tumor-'+t.id+'-location'));
      if(Number(t.size)>0) out.push(line('  '+sentence('Çap: '+t.size+' mm'),'tumor-'+t.id+'-size'));
      if(t.subtypes.length) out.push(line('  '+sentence('Histoloji: '+t.subtypes.join(' ve ')),'tumor-'+t.id+'-subtypes',t.subtypes.some(x=>BAD_SUBTYPES.has(x))));
      if(t.sample) out.push(line('  '+sentence('Örnek No: '+t.sample),'tumor-'+t.id+'-sample'));
      out.push(...generateFindingsLines(t,'  ').map(x=>({...x,key:'tumor-'+t.id+'-'+x.key}))); out.push(line('','space-t-'+t.id)); });
  }
  if(s.lymphNodes.length){ out.push(line('','space-ln')); out.push(line('Lenf nodları:','ln-title',false,true)); s.lymphNodes.forEach(ln=>{ const total=Number(ln.total||0), meta=Number(ln.metastatic||0), loc=ln.location?ln.location+' yerleşiminden ':''; if(meta>0){ let txt=sentence(loc+total+' lenf nodunun '+meta+"'inde metastaz VARDIR ("+meta+'/'+total+')'); const ms=String(ln.metastaticTumorSize||'').trim(); if(ms) txt+=' '+sentence((meta>1?'En büyük metastatik tümör çapı ':'Metastatik tümör çapı ')+ms+' mm'); txt+=' '+sentence('Ekstranodal yayılım (ENE) '+(ln.ene?'VARDIR':'yoktur')); if(ln.ene&&ln.eneSize) txt+=' '+sentence('ENE çapı '+ln.eneSize+' mm'); out.push(line(txt,'ln-'+ln.id,true)); } else out.push(line(sentence(loc+total+' lenf nodu izlenmiştir. Metastaz yoktur (0/'+total+')'),'ln-'+ln.id)); }); }
  if(s.backgroundThyroid.length){ out.push(line('','space-bg')); out.push(line(sentence('Tümör dışı tiroid parankiminde '+s.backgroundThyroid.join(', ')+' izlenmiştir'),'backgroundThyroid')); }
  return out;
}

function App(){
  const [state,setState]=useState(()=>{try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null'); return saved&&saved.tumors?saved:initialState;}catch{return initialState;}});
  const [flashKey,setFlashKey]=useState(null); const [copied,setCopied]=useState(false); const tumorRefs=useRef({}); const lnRefs=useRef({});
  useEffect(()=>{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));},[state]);
  const synced = useMemo(()=>({...state,tumors:state.tumors.map(syncTumor)}),[state]);
  const reportLines = useMemo(()=>generateReport(synced),[synced]);
  const reportText = reportLines.map(x=>x.text).join('\n').replace(/\n{3,}/g,'\n\n').trim();
  const badTumorCount=synced.tumors.filter(isTumorBad).length, badLnCount=synced.lymphNodes.filter(isLnBad).length;
  const bump=(key)=>{setFlashKey(key); window.clearTimeout(window.__flashTimer); window.__flashTimer=window.setTimeout(()=>setFlashKey(null),950)};
  const update=(patch,key)=>{setState(prev=>typeof patch==='function'?patch(prev):({...prev,...patch})); bump(key);};
  const updateTumor=(id,patch,key)=>update(prev=>({...prev,activeTumorId:id,tumors:prev.tumors.map(t=>t.id===id?syncTumor({...t,...(typeof patch==='function'?patch(t):patch)}):t)}), 'tumor-'+id+'-'+key);
  const updateLn=(id,patch,key)=>update(prev=>({...prev,activeLnId:id,lymphNodes:prev.lymphNodes.map(ln=>ln.id===id?{...ln,...(typeof patch==='function'?patch(ln):patch)}:ln)}),'ln-'+id+'-'+key);
  const scrollTumor=id=>{setState(p=>({...p,activeTumorId:id})); setTimeout(()=>tumorRefs.current[id]?.scrollIntoView({behavior:'smooth',block:'center'}),40)};
  const scrollLn=id=>{setState(p=>({...p,activeLnId:id})); setTimeout(()=>lnRefs.current[id]?.scrollIntoView({behavior:'smooth',block:'center'}),40)};
  const copyReport=async()=>{await navigator.clipboard.writeText(reportText); setCopied(true); setTimeout(()=>setCopied(false),1400)};
  const reset=()=>{ if(confirm('Tüm alanlar temizlensin mi?')){localStorage.removeItem(STORAGE_KEY); setState(initialState); bump('reset');} };

  return <div className="app">
    <header className="hero"><div className="hero-inner"><div className="brand"><div className="logo">TP</div><div><h1>Tiroid Papiller Karsinom Rapor Oluşturucu</h1><p className="subtitle">Statik React sürüm · Çoklu tümör odağı takibi · Kötü prognostik bulgular kırmızı vurgulu</p></div></div><div className="toolbar"><button className="btn ghost" onClick={reset}>↺ Temizle</button><button className="btn primary" onClick={copyReport}>⧉ Raporu Kopyala</button>{copied&&<span className="copy-ok">Kopyalandı</span>}</div></div>
      <div className="chipsbar"><span className="chips-title">Tümörler</span>{synced.tumors.map((t,i)=><button key={t.id} className={'chip '+(synced.activeTumorId===t.id?'active ':'')+(isTumorBad(t)?'bad':'')} onClick={()=>scrollTumor(t.id)}>{i+1}. Tümör {t.location?'· '+t.location:''}</button>)}<span className="sep"/><span className="chips-title">LN</span>{synced.lymphNodes.length?synced.lymphNodes.map((ln,i)=><button key={ln.id} className={'chip '+(synced.activeLnId===ln.id?'active ':'')+(isLnBad(ln)?'bad':'')} onClick={()=>scrollLn(ln.id)}>{i+1}. LN {ln.location?'· '+ln.location:''}</button>):<span className="hint">Lenf nodu grubu yok</span>}</div></header>
    <main className="layout"><section className="left left-scroll">
      <DiagnosisCard state={synced} update={update} flashKey={flashKey}/>
      <div className="card"><div className="card-head"><h2 className="card-title">● Tümör odakları</h2><button className="btn primary" onClick={()=>update(prev=>{const id=Date.now(); return {...prev,activeTumorId:id,tumors:[...prev.tumors,blankTumor(id)]}},'tumors')}>+ Tümör Odağı Ekle</button></div><div className="card-body section">{synced.tumors.map((tumor,i)=><TumorCard key={tumor.id} refEl={el=>tumorRefs.current[tumor.id]=el} tumor={tumor} index={i} active={synced.activeTumorId===tumor.id} canRemove={synced.tumors.length>1} updateTumor={updateTumor} removeTumor={()=>update(prev=>{const next=prev.tumors.filter(x=>x.id!==tumor.id); return {...prev,tumors:next,activeTumorId:next[0]?.id||null}},'tumors')} setActive={()=>update({activeTumorId:tumor.id},'tumor-'+tumor.id)} flashKey={flashKey}/>)}</div></div>
      <LnCard state={synced} update={update} updateLn={updateLn} flashKey={flashKey} refs={lnRefs} scrollLn={scrollLn}/>
      <BackgroundCard state={synced} update={update} flashKey={flashKey}/>
    </section><aside className="right"><div className="stats"><div className="stat"><b>{synced.tumors.length}</b><span>Tümör odağı</span></div><div className={'stat '+(badTumorCount?'bad':'')}><b>{badTumorCount}</b><span>Riskli tümör</span></div><div className="stat"><b>{synced.lymphNodes.length}</b><span>LN grubu</span></div><div className={'stat '+(badLnCount?'bad':'')}><b>{badLnCount}</b><span>Metastaz/ENE</span></div></div><ReportCard lines={reportLines} flashKey={flashKey} copyReport={copyReport} copied={copied}/></aside></main>
  </div>;
}
function DiagnosisCard({state,update,flashKey}){return <div className="card"><div className="card-head"><h2 className="card-title">◆ Tanı bilgileri</h2></div><div className="card-body grid"><SelectField className="full" label="Materyal Tipi" value={state.specimenType} options={['Total Tiroidektomi','Konsültasyon, Total tiroidektomi']} onChange={v=>update({specimenType:v},'specimenType')} flash={flashKey==='specimenType'}/><TextArea className="full" label="Tanı altına not" value={state.freeNote||''} onChange={v=>update({freeNote:v},'freeNote')} flash={flashKey==='freeNote'}/></div></div>}
function TumorCard({tumor,index,active,canRemove,updateTumor,removeTumor,setActive,flashKey,refEl}){ const bad=isTumorBad(tumor); const flashPrefix='tumor-'+tumor.id+'-'; return <div ref={refEl} className={'tumor-card '+(active?'active ':'')+(bad?'bad':'')} onFocus={setActive} onClick={setActive}><div className="tumor-top"><div><div className="tumor-name"><span className={'badge '+(active?'active ':'')+(bad?'bad':'')}>{index+1}. Odak</span>{tumor.location||'Yerleşim girilmedi'}</div><div className="mini-summary"><span className={'mini '+(tumor.size?'filled':'')}>{tumor.size?tumor.size+' mm':'Çap yok'}</span><span className={'mini '+(tumor.sample?'filled':'')}>{tumor.sample?'Örnek '+tumor.sample:'Örnek yok'}</span>{bad&&<span className="mini bad">Kırmızı bulgu var</span>}</div></div><button className="btn danger" disabled={!canRemove} onClick={(e)=>{e.stopPropagation();removeTumor();}}>Sil</button></div><div className="tumor-body section"><div className="grid"><TextField label="Yerleşim" list="tumor-locations" value={tumor.location} onChange={v=>updateTumor(tumor.id,{location:v},'location')} flash={flashKey===flashPrefix+'location'}/><NumberField label="Çap (mm)" value={tumor.size} onChange={v=>updateTumor(tumor.id,{size:v},'size')} flash={flashKey===flashPrefix+'size'}/><TextField label="Örnek No" value={tumor.sample} onChange={v=>updateTumor(tumor.id,{sample:v},'sample')} flash={flashKey===flashPrefix+'sample'}/><SelectField className="full" label="Histolojik Alt Tip" value={tumor.subtypes[0]} options={HISTOLOGIC_SUBTYPES} bad={BAD_SUBTYPES.has(tumor.subtypes[0])} onChange={v=>updateTumor(tumor.id,{subtypes:[v]},'subtypes')} flash={flashKey===flashPrefix+'subtypes'}/></div>
      <Toggle label="Enkapsülasyon" value={tumor.encapsulation} options={['Yoktur','vardır','Kısmen vardır']} onChange={v=>updateTumor(tumor.id,{encapsulation:v},'encapsulation')} flash={flashKey===flashPrefix+'encapsulation'}/>
      <Toggle label="Lenfatik ve/veya venöz invazyon" value={tumor.lvInvasion} options={['yoktur','VARDIR','Kuşkulu VARDIR']} badOptions={['VARDIR','Kuşkulu VARDIR']} onChange={v=>updateTumor(tumor.id,{lvInvasion:v,lymphaticInvasion:v==='VARDIR'?tumor.lymphaticInvasion:false,angioinvasion:v==='VARDIR'?tumor.angioinvasion:false},'lvInvasion')} flash={flashKey===flashPrefix+'lvInvasion'}/>
      {tumor.lvInvasion==='VARDIR'&&<div className="grid"><BoolField label="Lenfatik invazyon" value={tumor.lymphaticInvasion} badWhenTrue onChange={v=>updateTumor(tumor.id,{lymphaticInvasion:v},'lymphaticInvasion')}/><BoolField label="Anjioinvazyon" value={tumor.angioinvasion} badWhenTrue onChange={v=>updateTumor(tumor.id,{angioinvasion:v},'angioinvasion')}/></div>}
      <div className="grid"><BoolField label="Perinöral invazyon" value={tumor.perineuralInvasion} badWhenTrue onChange={v=>updateTumor(tumor.id,{perineuralInvasion:v},'perineuralInvasion')}/><TextField label="Mitotik Oran (/2 mm²)" value={tumor.mitoticActivity} onChange={v=>updateTumor(tumor.id,{mitoticActivity:String(v).replace(/[^0-9]/g,'')},'mitoticActivity')} flash={flashKey===flashPrefix+'mitoticActivity'}/><BoolField label="Nekroz" value={tumor.necrosis} trueText="izlendi" falseText="yoktur" badWhenTrue onChange={v=>updateTumor(tumor.id,{necrosis:v},'necrosis')}/></div>
      <CheckGroup label="Kapsül ilişkisi / Tiroid dışı invazyon" options={CAPSULE_ET_OPTIONS} selected={tumor.capsuleEtOptions} badOptions={['Tiroid dışı invazyon vardır']} onChange={(next)=>{ if(next.includes('Tiroid dışı invazyon vardır')) next=next.filter(x=>x!=='Tiroid dışı invazyon yoktur'); if(next.includes('Tiroid dışı invazyon yoktur')) next=next.filter(x=>x!=='Tiroid dışı invazyon vardır'); if(!next.length) next=['Tiroid dışı invazyon yoktur']; updateTumor(tumor.id,{capsuleEtOptions:next},'capsuleEtOptions'); }}/>
      {(tumor.capsuleEtOptions||[]).includes('Tiroid dışı invazyon vardır')&&<Toggle label="Çizgili kas invazyonu" value={tumor.strapMuscle||''} options={STRAP_OPTIONS} badOptions={['Çizgili kas invazyonu VARDIR']} onChange={v=>updateTumor(tumor.id,{strapMuscle:v},'strapMuscle')} flash={flashKey===flashPrefix+'strapMuscle'}/>}<BoolField label="Cerrahi sınırlar satırını rapora ekle" value={tumor.includeMarginsLine} trueText="Eklensin" falseText="Eklenmesin" onChange={v=>updateTumor(tumor.id,{includeMarginsLine:v,marginsTumorPresent:v?tumor.marginsTumorPresent:false,marginsNote:v?tumor.marginsNote:''},'includeMarginsLine')}/>{tumor.includeMarginsLine&&<><Toggle label="Cerrahi sınırlar" value={tumor.marginsTumorPresent?'Cerrahi sınırlarda tümör VARDIR':'Cerrahi sınırlarda tümör yoktur'} options={['Cerrahi sınırlarda tümör yoktur','Cerrahi sınırlarda tümör VARDIR']} badOptions={['Cerrahi sınırlarda tümör VARDIR']} onChange={v=>updateTumor(tumor.id,{marginsTumorPresent:v.includes('VARDIR'),marginsNote:v.includes('VARDIR')?tumor.marginsNote:''},'marginsTumorPresent')}/>{tumor.marginsTumorPresent&&<TextArea label="Cerrahi sınır ek açıklama" value={tumor.marginsNote||''} onChange={v=>updateTumor(tumor.id,{marginsNote:v},'marginsNote')} />}</>}</div></div>}
function LnCard({state,update,updateLn,flashKey,refs}){ return <div className="card"><div className="card-head"><h2 className="card-title">◇ Lenf nodu durumu</h2><button className="btn primary" onClick={()=>update(prev=>{const id=Date.now(); return {...prev,activeLnId:id,lymphNodes:[...prev.lymphNodes,blankLn(id)]}},'lymphNodes')}>+ Lenf Nodu Grubu Ekle</button></div><div className="card-body section">{state.lymphNodes.length===0&&<div className="hint">Lenf nodu grubu eklenmedi. Gerektiğinde sağ üstteki butonla ekleyebilirsiniz.</div>}{state.lymphNodes.map((ln,i)=><div key={ln.id} ref={el=>refs.current[ln.id]=el} className={'tumor-card '+(state.activeLnId===ln.id?'active ':'')+(isLnBad(ln)?'bad':'')} onFocus={()=>update({activeLnId:ln.id},'ln-'+ln.id)} onClick={()=>update({activeLnId:ln.id},'ln-'+ln.id)}><div className="tumor-top"><div className="tumor-name"><span className={'badge '+(isLnBad(ln)?'bad':'')}>{i+1}. LN</span>{ln.location||'Yerleşim girilmedi'}</div><button className="btn danger" onClick={(e)=>{e.stopPropagation();update(prev=>({...prev,lymphNodes:prev.lymphNodes.filter(x=>x.id!==ln.id)}),'lymphNodes')}}>Sil</button></div><div className="tumor-body section"><div className="grid"><TextField label="Yerleşim" value={ln.location||''} onChange={v=>updateLn(ln.id,{location:v},'location')}/><NumberField label="Metastatik" value={ln.metastatic} bad={Number(ln.metastatic)>0} onChange={v=>updateLn(ln.id,{metastatic:Number(v||0),...(Number(v||0)<=0?{metastaticTumorSize:'',ene:false,eneSize:'',pericapsularInvasion:false}:{})},'metastatic')}/><NumberField label="Toplam" value={ln.total} onChange={v=>updateLn(ln.id,{total:Number(v||0)},'total')}/></div>{Number(ln.metastatic)>0&&<><div className="grid"><NumberField label={Number(ln.metastatic)>1?'En büyük metastatik tümör çapı (mm)':'Metastatik tümör çapı (mm)'} value={ln.metastaticTumorSize||''} onChange={v=>updateLn(ln.id,{metastaticTumorSize:v},'metastaticTumorSize')}/><BoolField label="Ekstranodal yayılım (ENE)" value={!!ln.ene} badWhenTrue onChange={v=>updateLn(ln.id,{ene:v,pericapsularInvasion:v,eneSize:v?ln.eneSize:''},'ene')}/>{ln.ene&&<NumberField label="ENE çapı (mm)" value={ln.eneSize||''} bad onChange={v=>updateLn(ln.id,{eneSize:v},'eneSize')}/>}</div></>}</div></div>)}</div></div>}
function BackgroundCard({state,update}){return <div className="card"><div className="card-head"><h2 className="card-title">□ Tümör dışı tiroid</h2></div><div className="card-body"><CheckGroup label="Bulgular" options={BACKGROUND_THYROID_OPTIONS} selected={state.backgroundThyroid} onChange={sel=>update({backgroundThyroid:sel},'backgroundThyroid')}/></div></div>}
function ReportCard({lines,flashKey,copyReport,copied}){return <div className="card report-card"><div className="card-head"><h2 className="card-title">▣ Rapor Önizlemesi</h2><div className="report-actions"><button className="btn primary" onClick={copyReport}>⧉ Kopyala</button>{copied&&<span className="copy-ok">Kopyalandı</span>}</div></div><div className="report-preview">{lines.map((ln,i)=><span key={i} className={'report-line '+(ln.bad?'bad ':'')+(ln.title?'title ':'')+(flashKey&&ln.key&&String(flashKey).includes(ln.key)?'flash':'')}>{ln.text || ' '}</span>)}</div></div>}
function TextField({label,value,onChange,flash,bad,className='',list}){return <label className={'field '+className}><span className="label">{label}</span><input className={'input '+(value?'filled ':'')+(bad?'bad ':'')+(flash?'flash':'')} list={list} value={value||''} onChange={e=>onChange(e.target.value)}/>{list==='tumor-locations'&&<datalist id="tumor-locations">{TUMOR_LOCATION_EXAMPLES.map(x=><option key={x} value={x}/>)}</datalist>}</label>}
function NumberField(props){return <TextField {...props} value={props.value??''} onChange={props.onChange} />}
function TextArea({label,value,onChange,flash,className=''}){return <label className={'field '+className}><span className="label">{label}</span><textarea className={'textarea '+(value?'filled ':'')+(flash?'flash':'')} value={value||''} onChange={e=>onChange(e.target.value)}/></label>}
function SelectField({label,value,options,onChange,bad,flash,className=''}){return <label className={'field '+className}><span className="label">{label}</span><select className={'select filled '+(bad?'bad ':'')+(flash?'flash':'')} value={value} onChange={e=>onChange(e.target.value)}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select></label>}
function Toggle({label,value,options,onChange,badOptions=[],flash}){return <div className="field full"><span className="label">{label}</span><div className={'toggle-group '+(flash?'flash':'')}>{options.map(opt=><button key={opt} type="button" className={'toggle '+(value===opt?'active ':'')+(badOptions.includes(opt)?'bad':'')} onClick={()=>onChange(opt)}>{opt||'Seçilmedi'}</button>)}</div></div>}
function BoolField({label,value,onChange,trueText='VARDIR',falseText='yoktur',badWhenTrue=false}){return <div className="field"><span className="label">{label}</span><button type="button" className={'toggle '+(value?'active ':'')+(badWhenTrue&&value?'bad':'')} onClick={()=>onChange(!value)}>{value?trueText:falseText}</button></div>}
function CheckGroup({label,options,selected,onChange,badOptions=[]}){const sel=selected||[]; const toggle=opt=>sel.includes(opt)?sel.filter(x=>x!==opt):[...sel,opt]; return <div className="field full"><span className="label">{label}</span><div className="check-list">{options.map(opt=><label key={opt} className={'check '+(sel.includes(opt)?'selected ':'')+(badOptions.includes(opt)?'bad':'')}><input type="checkbox" checked={sel.includes(opt)} onChange={()=>onChange(toggle(opt))}/>{opt}</label>)}</div></div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
